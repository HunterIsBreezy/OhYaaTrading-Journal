<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mini candlesticks -->
  <!-- Green candle 1 -->
  <line x1="15" y1="8" x2="15" y2="40" stroke="#22c55e" stroke-width="2"/>
  <rect x="10" y="14" width="10" height="14" fill="#22c55e" rx="1"/>
  
  <!-- Red candle 2 (goes to bottom) -->
  <line x1="32" y1="20" x2="32" y2="56" stroke="#ef4444" stroke-width="2"/>
  <rect x="27" y="28" width="10" height="20" fill="#ef4444" rx="1"/>
  
  <!-- Green candle 3 (extends above) -->
  <line x1="49" y1="4" x2="49" y2="36" stroke="#22c55e" stroke-width="2"/>
  <rect x="44" y="8" width="10" height="16" fill="#22c55e" rx="1"/>
  
  <!-- Trend line with white outline -->
  <path d="M8 48 L24 32 L40 40 L56 28 L72 16" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M8 48 L24 32 L40 40 L56 28 L72 16" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Arrow head with white outline -->
  <path d="M64 16 L72 16 L72 24" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M64 16 L72 16 L72 24" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- ohYaaa text -->
  <text x="85" y="42" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" letter-spacing="-1">
    <tspan fill="#111827">oh</tspan><tspan fill="#2563eb">Yaaa</tspan>
  </text>
  
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
</svg>
